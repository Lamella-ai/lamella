<tr>
  <td>{% if row.sent_at %}{{ row.sent_at|local_ts }}{% endif %}</td>
  <td>{{ row.channel }}</td>
  <td>{{ row.priority }}</td>
  <td>{{ row.title }}</td>
  <td>
    {% if row.delivered %}
      <span class="status status-linked">delivered</span>
    {% else %}
      <span class="status status-ignored">{{ row.error or 'failed' }}</span>
    {% endif %}
  </td>
  <td>
    {% if not row.delivered %}
    <form method="post" action="/notifications/{{ row.id }}/resend" class="inline-form">
      <button type="submit">Resend</button>
    </form>
    {% endif %}
  </td>
</tr>
