<select name="col_{{ src.id }}_{{ col }}">
  {% for option in canonical_options %}
  <option value="{{ option }}"
    {% if (mapping.column_map.get(col) or "") == option %}selected{% endif %}>
    {% if option %}{{ option }}{% else %}— drop —{% endif %}
  </option>
  {% endfor %}
</select>
