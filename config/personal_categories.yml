# Personal entity category scaffold.
#
# Two kinds of entries live here:
#
#   1. Schedule A itemized-deduction categories — `line` prefixed with
#      "A-" so the reporter can surface them on a Schedule A summary
#      even though the chart of accounts is entity-first. These matter
#      at tax time for anyone who itemizes (vs. standard deduction).
#
#   2. Common personal-living categories — no `line` field. Not
#      deductible, but worth tracking for personal finance clarity
#      (food, housing, transportation, entertainment, etc.). Without
#      these, the AI classifier dumps every grocery run and utility
#      bill into `Expenses:Personal:Uncategorized` because that's
#      the only existing bucket.
#
# Each entry's `account_patterns` list tells the reporter which
# account-path regexes to match for that category. The scaffolder
# writes the FIRST pattern's canonical concrete form as an Open
# directive. Patterns use Python `re.match` (anchored at start).

# ------------------------- Schedule A (deductible) ----------------------

- line: A-1
  description: "Medical and dental expenses"
  account_patterns:
    - "Expenses:[^:]+:Medical($|:)"
    - "Expenses:[^:]+:Healthcare($|:)"

- line: A-5a
  description: "State and local income tax (SALT)"
  account_patterns:
    - "Expenses:[^:]+:Taxes:StateIncome($|:)"
    - "Expenses:[^:]+:Taxes:State($|:)"

- line: A-5b
  description: "State and local real estate taxes"
  account_patterns:
    - "Expenses:[^:]+:Taxes:RealEstate($|:)"
    - "Expenses:[^:]+:Taxes:Property($|:)"

- line: A-5c
  description: "State and local personal property taxes"
  account_patterns:
    - "Expenses:[^:]+:Taxes:PersonalProperty($|:)"

- line: A-8a
  description: "Home mortgage interest reported on Form 1098"
  account_patterns:
    - "Expenses:[^:]+:Interest:Mortgage($|:)"
    - "Expenses:[^:]+:MortgageInterest($|:)"

- line: A-11
  description: "Charitable contributions by cash or check"
  account_patterns:
    - "Expenses:[^:]+:CharitableContributions($|:)"
    - "Expenses:[^:]+:Charity($|:)"

- line: A-12
  description: "Charitable contributions other than by cash"
  account_patterns:
    - "Expenses:[^:]+:CharitableContributions:NonCash($|:)"

- line: A-15
  description: "Casualty and theft losses"
  account_patterns:
    - "Expenses:[^:]+:CasualtyLosses($|:)"

- line: A-16
  description: "Other itemized deductions (gambling losses, etc.)"
  account_patterns:
    - "Expenses:[^:]+:GamblingLosses($|:)"
    - "Expenses:[^:]+:OtherItemized($|:)"

