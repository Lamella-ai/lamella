# Schedule F (Form 1040) — Part II Farm Expenses line map.
# Entries mirror the IRS line numbering. Tune to your farm/FarmCo
# account hierarchy.

- line: 10
  description: "Car and truck expenses"
  account_patterns:
    - "Expenses:[^:]+:Auto($|:)"
    - "Expenses:[^:]+:Vehicle($|:)"

- line: 11
  description: "Chemicals"
  account_patterns:
    - "Expenses:[^:]+:Chemicals($|:)"

