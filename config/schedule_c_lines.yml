- line: 27a
  description: "Other expenses"
  account_patterns:
    - "Expenses:[^:]+:Shipping($|:)"
    - "Expenses:[^:]+:Software($|:)"
    - "Expenses:[^:]+:Subscriptions($|:)"
    - "Expenses:[^:]+:Bank($|:)"
