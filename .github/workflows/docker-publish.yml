name: Build and publish Docker image

# Fast app-only build. FROMs the prebuilt base image at
# ghcr.io/<owner>/<repo>-base:latest for heavy deps. The owner +
# repo are auto-derived from ${{ github.repository }} below, so
# this works regardless of where the repo lives.
# If this build fails with "base image not found", run the
# `Build and publish base Docker image` workflow first.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # We'll derive a lowercase version of this in the jobs section.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix: Sanitize repository name to lowercase to satisfy Docker naming requirements [cite: 402]
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Use the new lowercase environment variable here [cite: 403]
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Resolve the Dockerfile's BASE_IMAGE placeholder using the sanitized name [cite: 403, 408]
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-base:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app